name: Weekly data update

on:
  schedule:
    - cron: '0 21 * * 6'   # 毎週土 21:00 UTC = 日 06:00 JST（日本の日曜朝）
  workflow_dispatch: {}      # 手動実行も可（テスト用）

permissions:
  contents: write            # data.json をコミットするため

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Update data.json with Claude Code (Max/Pro subscription)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat update-prompt.md)" \
            --allowedTools "WebSearch,WebFetch,Read,Edit,Write" \
            --max-turns 60

      - name: Validate data.json
        run: |
          node -e "const d=require('./data.json'); if(!Array.isArray(d.events)||d.events.length<10||!Array.isArray(d.pins)||d.pins.length<10){throw new Error('data.json invalid: events='+((d.events||[]).length)+' pins='+((d.pins||[]).length));} console.log('valid: events',d.events.length,'pins',d.pins.length);"

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "fw-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: weekly data update ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "変更なし（コミットしません）"
          fi
